<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management - CS416</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel-dark">
            <div class="sidebar-header">
                <div class="logo">CS416 Dashboard</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Overview</a>
                <a href="#" class="nav-item active">Courses</a>
                <a href="#" class="nav-item">Assignments</a>
                <a href="#" class="nav-item">Grades</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-secondary logout-btn">Log Out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <a href="dashboard.html" style="text-decoration: none; font-size: 1.2rem; color: var(--primary-color); margin-right: 1rem;">&#8592;</a>
                    <h1 class="page-title" id="courseTitle">Course Details</h1>
                </div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <div class="avatar">U</div>
                        <span class="username">Student</span>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <div class="courses-header">
                    <h2>Assignments</h2>
                    <button id="addAssignmentBtn" class="btn btn-primary">+ Add Assignment</button>
                </div>
                <div class="assignments-list" id="assignmentsList">
                    <!-- Default mock assignment -->
                    <div class="assignment-item">
                        <div class="assignment-info">
                            <h4>Project 1: Basic App</h4>
                            <span class="assignment-meta">Added 2 days ago</span>
                        </div>
                        <div class="assignment-grade">
                            <span class="badge">Uploaded</span>
                            <button class="btn btn-secondary">View Students</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Assignment Modal -->
    <div id="addAssignmentModal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3>Create Assignment & Grades</h3>
                <button class="close-modal" id="closeAssignIcon">&times;</button>
            </div>
            <form id="addAssignmentForm">
                <div class="input-group">
                    <label for="assignmentName">Assignment Name</label>
                    <input type="text" id="assignmentName" required placeholder="e.g. Midterm Exam">
                </div>
                
                <div class="input-group" style="margin-top: 1.5rem;">
                    <label>Upload Grades (CSV)</label>
                    <div class="file-upload-zone" id="fileUploadZone">
                        <div class="upload-icon">📄</div>
                        <span>Drag & Drop your CSV file here</span>
                        <small>or click to browse</small>
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
                    </div>
                    <p id="fileNameDisplay" style="text-align: center; color: var(--primary-color); font-weight: 500; font-size: 0.9rem; margin-top: 0.5rem;"></p>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary close-modal" id="closeAssignBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveAssignmentBtn" disabled>Save Assignment</button>
                </div>
            </form>
        </div>
    </div>
    <script src="course.js"></script>
</body>
</html>
